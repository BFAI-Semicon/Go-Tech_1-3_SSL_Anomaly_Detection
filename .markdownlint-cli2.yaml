# markdownlint-cli2 設定
# ルール詳細: https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

config:
  # 日本語ドキュメントは行長を厳格にしない
  MD013: false
  # 見出しレベルの飛ばし・重複はノート系ドキュメントで頻出するため緩和
  MD001: false
  MD024: false
  # 先頭が H1 でないメモ・抜粋を許容
  MD041: false

globs:
  - "**/*.md"
  - "**/*.mdc"

ignores:
  - ".takt/**"
  - ".venv/**"
  - "docs/LeadersBoard/**"
  - "docs/official.md"
  - "node_modules/**"
